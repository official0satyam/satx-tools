<div class="form-group" style="display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-bottom: var(--space-md);">
  <span style="font-size: 0.85rem; font-weight: 700; color: var(--text-muted); font-family: var(--font-header);">Currency:</span>
  <select class="input-control currency-select" style="width: auto; padding: 4px 12px; min-height: unset; height: 32px; font-size: 0.85rem; border-radius: 8px; margin-top: 0;">
    <option value="$">USD ($)</option>
    <option value="₹">INR (₹)</option>
    <option value="€">EUR (€)</option>
    <option value="£">GBP (£)</option>
    <option value="¥">JPY (¥)</option>
  </select>
</div>

<!-- Segmented Tab Selectors for Investment Mode -->
<div class="segmented-control">
  <button class="segment-btn active" id="btn-sip-monthly" onclick="switchSipTab('monthly')">Monthly SIP</button>
  <button class="segment-btn" id="btn-sip-lumpsum" onclick="switchSipTab('lumpsum')">One-Time Lumpsum</button>
</div>

<div class="form-group">
  <label for="sip-amount" style="display: flex; justify-content: space-between;">
    <span id="lbl-sip-amount">Monthly Investment (<span class="currency-symbol">$</span>)</span>
    <span id="sip-amount-lbl" style="color: var(--primary); font-weight: 800;"><span class="currency-symbol">$</span>2,000</span>
  </label>
  <input type="range" id="sip-amount" min="100" max="50000" step="100" value="2000" class="input-control" oninput="calculateSIP()">
  <input type="number" id="sip-amount-num" class="input-control" value="2000" style="margin-top: 8px;" oninput="syncSIPSliders('amount')">
</div>

<div class="form-group">
  <label for="sip-rate" style="display: flex; justify-content: space-between;">
    <span>Expected Return Rate (% P.A.)</span>
    <span id="sip-rate-lbl" style="color: var(--primary); font-weight: 800;">12%</span>
  </label>
  <input type="range" id="sip-rate" min="1" max="30" step="0.5" value="12" class="input-control" oninput="calculateSIP()">
  <input type="number" id="sip-rate-num" class="input-control" value="12" step="0.5" style="margin-top: 8px;" oninput="syncSIPSliders('rate')">
</div>

<div class="form-group">
  <label for="sip-years" style="display: flex; justify-content: space-between;">
    <span>Time Period (Years)</span>
    <span id="sip-years-lbl" style="color: var(--primary); font-weight: 800;">10 Years</span>
  </label>
  <input type="range" id="sip-years" min="1" max="40" step="1" value="10" class="input-control" oninput="calculateSIP()">
  <input type="number" id="sip-years-num" class="input-control" value="10" style="margin-top: 8px;" oninput="syncSIPSliders('years')">
</div>

<div class="result-panel success">
  <div class="result-label" style="text-align: left; margin-bottom: var(--space-md); color: var(--secondary); font-family: var(--font-header); font-size: 1.1rem; border-bottom: 2px dashed rgba(13, 148, 136, 0.2); padding-bottom: var(--space-sm);">Future Estimated Wealth</div>
  
  <div class="result-val" id="sip-output-val">$464,678.16</div>
  
  <div style="display: flex; flex-direction: column; gap: 8px; margin-top: var(--space-md);">
    <div class="invoice-row">
      <span class="invoice-lbl">Invested Capital Amount:</span>
      <span id="sip-res-invested" class="invoice-val">$240,000.00</span>
    </div>
    <div class="invoice-row">
      <span class="invoice-lbl">Estimated Interest Returns:</span>
      <span id="sip-res-returns" class="invoice-val" style="color: var(--secondary); font-weight: 700;">+$224,678.16</span>
    </div>
    <div class="invoice-row invoice-total-row">
      <span class="invoice-lbl">Maturity Portfolio Value:</span>
      <span id="sip-res-total" class="invoice-val">$464,678.16</span>
    </div>
  </div>
  
  <div class="progress-container" style="margin-top: var(--space-md); height: 16px;">
    <div id="sip-bar-invested" class="progress-fill" style="background-color: var(--secondary); width: 52%; float: left;" title="Invested Amount"></div>
    <div id="sip-bar-returns" style="height: 100%; background-color: var(--primary); width: 48%; float: left;" title="Interest Returns"></div>
  </div>
  <div style="display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 700; margin-top: 6px; color: var(--text-muted);">
    <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; background: var(--secondary); border-radius: 2px; display: inline-block;"></span> Invested (<span id="sip-pct-invested">52%</span>)</span>
    <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; background: var(--primary); border-radius: 2px; display: inline-block;"></span> Est. Returns (<span id="sip-pct-returns">48%</span>)</span>
  </div>
</div>

<div class="copy-btn-wrapper">
  <button onclick="copySIPResult(this)" class="btn btn-secondary btn-copy">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
    Copy Investment Summary
  </button>
</div>
