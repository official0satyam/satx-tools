<!-- Segmented Tab Selectors for Units -->
<div class="segmented-control">
  <button class="segment-btn active" id="btn-bmi-metric" onclick="switchBmiTab('metric')">Metric (kg/cm)</button>
  <button class="segment-btn" id="btn-bmi-imperial" onclick="switchBmiTab('imperial')">Imperial (lbs/in)</button>
</div>

<!-- Metric Form inputs -->
<div id="panel-bmi-metric" class="bmi-panel">
  <div class="grid-2col" style="margin-bottom: var(--space-lg);">
    <div class="form-group">
      <label for="bmi-weight-metric">Weight (kg)</label>
      <input type="number" id="bmi-weight-metric" class="input-control" value="70" step="0.5" oninput="calculateBMI()">
    </div>
    <div class="form-group">
      <label for="bmi-height-metric">Height (cm)</label>
      <input type="number" id="bmi-height-metric" class="input-control" value="175" step="1" oninput="calculateBMI()">
    </div>
  </div>
</div>

<!-- Imperial Form inputs -->
<div id="panel-bmi-imperial" class="bmi-panel" style="display: none;">
  <div class="grid-2col" style="margin-bottom: var(--space-lg);">
    <div class="form-group">
      <label for="bmi-weight-imperial">Weight (lbs)</label>
      <input type="number" id="bmi-weight-imperial" class="input-control" value="154" step="0.5" oninput="calculateBMI()">
    </div>
    <div class="form-group">
      <label style="display: block; font-weight: 700; font-size: 0.95rem; margin-bottom: var(--space-sm); color: var(--text-title); font-family: var(--font-header);">Height</label>
      <div style="display: flex; gap: 8px;">
        <input type="number" id="bmi-height-ft" class="input-control" placeholder="Ft" value="5" step="1" oninput="calculateBMI()">
        <input type="number" id="bmi-height-in" class="input-control" placeholder="In" value="9" step="1" oninput="calculateBMI()">
      </div>
    </div>
  </div>
</div>

<div class="result-panel warning">
  <div class="result-label">Body Mass Index (BMI)</div>
  <div class="result-val" id="bmi-val">22.9</div>
  <div id="bmi-category" style="font-family: var(--font-header); font-weight: 800; font-size: 1.25rem; color: var(--green); margin-top: 4px;">Normal Weight 💎</div>
  
  <!-- Color-coded BMI Scale visualization -->
  <div style="position: relative; margin-top: var(--space-lg); padding: 0 4px;">
    <!-- Visual pointer indicator -->
    <div id="bmi-pointer" style="position: absolute; top: -14px; left: 45%; transform: translateX(-50%); width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 10px solid var(--text); transition: left 0.3s ease;"></div>
    
    <div style="height: 12px; border-radius: 99px; overflow: hidden; display: flex; width: 100%; border: 1px solid var(--border-color);">
      <div style="background-color: #fde047; width: 18.5%;" title="Underweight (< 18.5)"></div>
      <div style="background-color: #10b981; width: 6.5%;" title="Normal (18.5 - 25)"></div>
      <div style="background-color: #f59e0b; width: 5%;" title="Overweight (25 - 30)"></div>
      <div style="background-color: #ef4444; width: 70%;" title="Obese (>= 30)"></div>
    </div>
    
    <div style="display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 700; margin-top: 6px; color: var(--text-light);">
      <span>15.0</span>
      <span>18.5</span>
      <span>25.0</span>
      <span>30.0</span>
      <span>40.0</span>
    </div>
  </div>
</div>

<!-- Detailed Stats Card -->
<div class="glass-card" style="margin-top: var(--space-lg); padding: var(--space-md);">
  <h3 style="margin-bottom: var(--space-md); font-family: var(--font-header); font-weight: 800; border-bottom: 2px dashed var(--border-color); padding-bottom: var(--space-xs);">Health Breakdown</h3>
  
  <div style="display: flex; flex-direction: column; gap: 8px;">
    <div class="invoice-row">
      <span class="invoice-lbl">Healthy Weight Range:</span>
      <span id="bmi-healthy-range" class="invoice-val">56.7 - 76.2 kg</span>
    </div>
    <div class="invoice-row" id="bmi-advice-row" style="color: var(--primary);">
      <span class="invoice-lbl" id="bmi-advice-lbl">Ideal Target Goal:</span>
      <span id="bmi-advice-val" class="invoice-val" style="font-weight: 700;">You are in a healthy weight range!</span>
    </div>
  </div>
</div>

<div class="copy-btn-wrapper">
  <button onclick="copyBMIResult(this)" class="btn btn-secondary btn-copy">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
    Copy BMI Details
  </button>
</div>
