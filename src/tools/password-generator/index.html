<div class="form-group">
  <label for="pwd-length" style="display: flex; justify-content: space-between;">
    <span>Character Length</span>
    <span id="pwd-length-val" style="color: var(--primary); font-weight: 800;">16</span>
  </label>
  <input type="range" id="pwd-length" min="6" max="64" value="16" class="input-control" oninput="document.getElementById('pwd-length-val').innerText = this.value;">
</div>

<div class="checkbox-group" style="grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: var(--space-sm); margin-bottom: var(--space-md);">
  <label class="checkbox-label">
    <input type="checkbox" id="pwd-lowercase" checked>
    a-z (Lower)
  </label>
  <label class="checkbox-label">
    <input type="checkbox" id="pwd-uppercase" checked>
    A-Z (Upper)
  </label>
  <label class="checkbox-label">
    <input type="checkbox" id="pwd-numbers" checked>
    0-9 (Numbers)
  </label>
  <label class="checkbox-label">
    <input type="checkbox" id="pwd-symbols" checked>
    !@#$ (Symbols)
  </label>
</div>

<div style="margin-bottom: var(--space-lg);">
  <label class="checkbox-label">
    <input type="checkbox" id="pwd-exclude-similar">
    Exclude Similar Characters (e.g. i, l, 1, o, 0, O)
  </label>
</div>

<div class="result-panel">
  <div class="result-label" style="margin-bottom: var(--space-sm);">Generated Secure Key</div>
  
  <div style="position: relative; display: flex; align-items: center;">
    <div id="pwd-output-val" class="text-output-block" style="flex: 1; margin-bottom: 0; padding-right: 50px; font-size: clamp(1rem, 2.5vw, 1.4rem); overflow-x: auto; white-space: nowrap;">
      Generating...
    </div>
    <button onclick="generateSecurePassword()" class="btn btn-secondary" style="position: absolute; right: 8px; width: 36px; height: 36px; min-height: unset; padding: 0; border-radius: 50%; display: grid; place-items: center;" title="Regenerate Password">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text);"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
    </button>
  </div>
  
  <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: var(--space-md);">
    <div class="progress-container" style="width: 100px; margin-top: 0; border-radius: 6px; height: 10px;">
      <div id="pwd-strength-bar" class="progress-fill" style="background-color: var(--secondary); width: 100%;"></div>
    </div>
    <span id="pwd-strength-lbl" style="font-weight: 800; font-size: 0.85rem; color: var(--secondary); font-family: var(--font-header);">Strong 💎</span>
  </div>
</div>

<div class="copy-btn-wrapper">
  <button onclick="copyPasswordResult(this)" class="btn btn-secondary btn-copy">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
    Copy Secure Password
  </button>
</div>
