<div class="robots-txt-tool-wrapper" style="display: flex; flex-direction: column; gap: var(--space-lg);">

  <div style="display: grid; grid-template-columns: 1fr; gap: var(--space-lg);">
    <!-- Configurations Panel -->
    <div class="glass-card" style="padding: var(--space-lg); border-color: rgba(245, 158, 11, 0.15);">
      <h3 style="font-size: 1.2rem; font-family: var(--font-header); margin-bottom: var(--space-md); color: var(--text-main); display: flex; align-items: center; gap: 8px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--orange);"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4M8 15h.01M16 15h.01"></path></svg>
        Robots.txt Parameters
      </h3>

      <!-- Default Crawling Rule -->
      <div class="form-group" style="margin-bottom: var(--space-md);">
        <label for="robots-default-rule">Default Search Engine Crawler Access</label>
        <select id="robots-default-rule" class="input-control" onchange="generateRobotsTxt()">
          <option value="allow" selected>Allow all crawlers access to everything</option>
          <option value="disallow">Disallow (Block) all crawlers from everything</option>
        </select>
        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;">Controls the global User-agent: * directive.</p>
      </div>

      <!-- Crawl Delay -->
      <div class="form-group" style="margin-bottom: var(--space-md);">
        <label for="robots-delay">Crawl Delay (Seconds)</label>
        <select id="robots-delay" class="input-control" onchange="generateRobotsTxt()">
          <option value="" selected>No Crawl Delay (Default)</option>
          <option value="5">5 Seconds</option>
          <option value="10">10 Seconds</option>
          <option value="20">20 Seconds</option>
        </select>
        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;">Tells search bots to pace requests. Leave empty for Google/Bing.</p>
      </div>

      <!-- Sitemap Field -->
      <div class="form-group" style="margin-bottom: var(--space-md);">
        <label for="robots-sitemap">Sitemap XML URL (Optional)</label>
        <input type="url" id="robots-sitemap" class="input-control" placeholder="e.g. https://tools.satex.fun/sitemap.xml" value="https://tools.satex.fun/sitemap.xml" oninput="generateRobotsTxt()">
      </div>

      <!-- Directories to Disallow -->
      <div class="form-group" style="margin-bottom: var(--space-md);">
        <label for="robots-disallows">Blocked Folders/Paths (One per line, e.g. /admin/)</label>
        <textarea id="robots-disallows" class="input-control" rows="3" placeholder="e.g.&#10;/admin/&#10;/private/&#10;/temp/" oninput="generateRobotsTxt()"></textarea>
      </div>

      <!-- Specific Bot Directives -->
      <div style="margin-top: var(--space-md);">
        <label style="font-weight: 700; margin-bottom: var(--space-sm); display: block;">Search Engine Bot Specific Controls</label>
        <div class="grid-2col" style="gap: var(--space-sm);">
          <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer;">
            <input type="checkbox" id="bot-google" checked onchange="generateRobotsTxt()"> Googlebot (Search)
          </label>
          <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer;">
            <input type="checkbox" id="bot-google-img" checked onchange="generateRobotsTxt()"> Googlebot-Image
          </label>
          <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer;">
            <input type="checkbox" id="bot-bing" checked onchange="generateRobotsTxt()"> Bingbot (Microsoft)
          </label>
          <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer;">
            <input type="checkbox" id="bot-yandex" checked onchange="generateRobotsTxt()"> Yandexbot (Russian)
          </label>
          <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer;">
            <input type="checkbox" id="bot-baidu" checked onchange="generateRobotsTxt()"> Baiduspider (Chinese)
          </label>
          <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer;">
            <input type="checkbox" id="bot-duck" checked onchange="generateRobotsTxt()"> DuckDuckBot
          </label>
        </div>
      </div>

    </div>
  </div>

  <!-- Output Textbox Panel -->
  <div class="result-panel success" style="display: flex; flex-direction: column; padding: var(--space-lg); text-align: left;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-md); width: 100%; flex-wrap: wrap; gap: var(--space-sm);">
      <span class="result-label" style="color: var(--secondary); font-family: var(--font-header); font-size: 1.1rem; font-weight: 800; margin: 0;">Generated robots.txt File Content</span>
      
      <div style="display: flex; gap: var(--space-sm);">
        <button class="btn btn-secondary" onclick="copyRobotsTxt(this)" style="padding: 6px 12px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          Copy to Clipboard
        </button>
        <button class="btn btn-primary" onclick="downloadRobotsTxt()" style="padding: 6px 12px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Download robots.txt
        </button>
      </div>
    </div>
    
    <div style="position: relative; width: 100%;">
      <pre style="margin: 0; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color); border-radius: 8px; padding: var(--space-md); overflow-x: auto; max-width: 100%;"><code id="robots-output-code" style="font-family: monospace; font-size: 0.9rem; color: #e2e8f0; white-space: pre; display: block; line-height: 1.5;"></code></pre>
    </div>
  </div>

</div>
