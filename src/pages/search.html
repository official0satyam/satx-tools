<!--
{
  "title": "Search Results",
  "description": "Search and find free online calculators, converters, and developer utility tools on SatX Tools.",
  "slug": "search"
}
-->
<section class="section" style="margin-bottom: var(--space-xl);">
  <span class="section-chip">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" style="width: 12px; height: 12px; display: inline-block; vertical-align: middle; margin-right: 4px;">
      <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    Search Site
  </span>
  <h1 style="margin-top: var(--space-sm); margin-bottom: var(--space-md);">Tool Search Results</h1>
  
  <div class="search-box-container" style="max-width: 600px; margin: 0 0 var(--space-xl) 0; position: relative;">
    <div class="search-wrap" role="search" aria-label="Search tools" style="border: 2px solid var(--border-color); border-radius: 12px; box-shadow: var(--shadow-sm); overflow: visible; display: flex; align-items: center; background: var(--card-bg); height: 50px; padding: 0 var(--space-sm);">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-light); margin-right: 10px; flex-shrink: 0;">
        <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="search-page-input" class="input-control" placeholder="Search for tools (e.g. percentage, password, pdf)..." autocomplete="off" style="border: none; background: transparent; padding: 0; margin: 0; box-shadow: none; font-size: 1rem; width: 100%; height: 100%;">
    </div>
  </div>

  <div id="search-results-page-container">
    <p style="color: var(--text-muted);">Loading search results...</p>
  </div>
</section>
