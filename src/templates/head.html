<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{page_title}} - SatX Tools</title>
<meta name="description" content="{{page_description}}">
<link rel="canonical" href="{{canonical_url}}">
<meta name="keywords" content="SatX Tools, Satex Tools, ZX Tools, Sat X Tools, online calculators, developer utilities, pdf tools, age calculator, percentage calculator, word counter, client-side tools">

<!-- Google Search Console Verification (Method B) -->
<!-- <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE_HERE" /> -->

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{google_analytics_id}}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{google_analytics_id}}');
</script>

<!-- PWA Manifest & Settings -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SatX Tools">

<!-- Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.error('SW registration failed:', err));
    });
  }
</script>


<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="{{canonical_url}}">
<meta property="og:title" content="{{page_title}} - SatX Tools">
<meta property="og:description" content="{{page_description}}">
<meta property="og:image" content="{{og_image}}">

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="{{canonical_url}}">
<meta property="twitter:title" content="{{page_title}} - SatX Tools">
<meta property="twitter:description" content="{{page_description}}">
<meta property="twitter:image" content="{{og_image}}">

<!-- Favicon -->
<link rel="icon" type="image/png" href="/assets/images/logo.png">

<!-- Google Fonts (Sora for Headers & Inter for Body Text) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

<!-- CSS Stylesheets -->
<link rel="stylesheet" href="/assets/css/main.css">
{{additional_css}}

<!-- Injected client-side search index -->
<script>
  window.searchIndex = {{search_index_json}};
</script>
